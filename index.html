<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Récompenses Posty78</title>

<style>

body{
    margin:0;
    background:#050505;
    color:white;
    font-family:Arial,sans-serif;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
    color:#53fc18;
}

.card{
    background:#111;
    border:1px solid #2b2b2b;
    border-radius:18px;
    padding:20px;
    margin-top:20px;
}

input{
    width:100%;
    box-sizing:border-box;
    padding:15px;
    border-radius:12px;
    border:1px solid #333;
    background:#050505;
    color:white;
    font-size:18px;
}

button{
    margin-top:12px;
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#53fc18;
    color:black;
    font-weight:bold;
    font-size:18px;
    cursor:pointer;
}

.result{
    margin-top:20px;
    padding:20px;
    border-radius:12px;
    background:#070707;
    display:none;
}

</style>
</head>

<body>

<div class="container">

<h1>Récompenses Posty78</h1>

<div class="card">

<p>
Entrez votre numéro de billet :
</p>

<input
id="ticket"
placeholder="Ex : 0006">

<button onclick="rechercher()">
Rechercher
</button>

<div id="result" class="result">

Aucun résultat.

</div>

</div>

</div>

<script>

function rechercher(){

let numero =
document.getElementById("ticket").value;

document.getElementById("result").style.display="block";

document.getElementById("result").innerHTML =
"Recherche du billet : <b>" + numero + "</b><br><br>Version de test.";

}

</script>

</body>
</html>
